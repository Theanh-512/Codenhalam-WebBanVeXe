<div class="auth-container">
    <div class="auth-card">
        <div class="auth-left">
            <div class="logo">
                <i class="fas fa-bus"></i> <span>VeXe System</span>
            </div>
            <h2>Welcome Back!</h2>
            <p>Log in to manage your bus routes, trips, and bookings easily.</p>

            <form class="auth-form" (submit)="onLogin($event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="e.g. admin@vexesystem.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="/register" routerLink="/register">Register here</a>
            </p>
        </div>
        <div class="auth-right">
            <div class="illustration"></div>
        </div>
    </div>
</div>
